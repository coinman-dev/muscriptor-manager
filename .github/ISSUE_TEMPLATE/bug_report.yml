name: Bug report
description: Report an issue with the Windows manager
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include Hugging Face tokens or other secrets.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the expected and actual behavior.
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows and PowerShell versions
      placeholder: Windows 11 24H2, PowerShell 7.5
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: GPU and NVIDIA driver
      placeholder: RTX 4070, driver 576.80
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      render: text
